<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0f172a">
<title>TEOT — Notas</title>
<style>
:root{
  --bg:#0f172a;--surface:#1e293b;--surface2:#273549;--surface3:#2d3f55;
  --border:rgba(255,255,255,.08);--border2:rgba(255,255,255,.15);
  --text:#f1f5f9;--text2:#94a3b8;--text3:#64748b;
  --green:#10b981;--green-bg:rgba(16,185,129,.12);--green-border:rgba(16,185,129,.3);
  --blue:#3b82f6;--red:#ef4444;--yellow:#f59e0b;
  --radius:12px;--radius-sm:8px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
  background:var(--bg);color:var(--text);min-height:100vh;font-size:15px;
  display:flex;flex-direction:column;}

/* HEADER */
.header{background:var(--surface);border-bottom:1px solid var(--border);
  padding:12px 16px;display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100;flex-shrink:0}
.header-left{display:flex;align-items:center;gap:12px}
.btn-back{font-size:13px;color:var(--text2);background:transparent;border:none;
  cursor:pointer;padding:4px 0;display:flex;align-items:center;gap:4px}
.btn-back:hover{color:var(--green)}
.logo{font-size:15px;font-weight:800}
.logo span{color:var(--green)}
.sync-row{display:flex;align-items:center;gap:6px}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--text3);transition:background .3s}
.sync-dot.ok{background:var(--green)}
.sync-dot.err{background:var(--red)}
.sync-dot.loading{background:var(--yellow);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.sync-lbl{font-size:11px;color:var(--text3)}

/* LAYOUT */
.layout{display:flex;flex:1;overflow:hidden;height:calc(100vh - 53px)}

/* SIDEBAR */
.sidebar{width:260px;flex-shrink:0;background:var(--surface);
  border-right:1px solid var(--border);display:flex;flex-direction:column;
  overflow:hidden}
.sidebar-header{padding:12px 14px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between}
.sidebar-title{font-size:12px;font-weight:700;letter-spacing:.06em;color:var(--text3)}
.btn-icon{background:transparent;border:none;cursor:pointer;color:var(--text3);
  width:28px;height:28px;border-radius:6px;display:flex;align-items:center;
  justify-content:center;font-size:16px;transition:all .15s}
.btn-icon:hover{background:var(--surface2);color:var(--text)}
.sidebar-search{padding:8px 14px;border-bottom:1px solid var(--border)}
.search-input{width:100%;background:var(--bg);border:1px solid var(--border2);
  border-radius:var(--radius-sm);padding:7px 10px;font-size:13px;color:var(--text);
  outline:none}
.search-input:focus{border-color:var(--green)}
.search-input::placeholder{color:var(--text3)}
.tree{flex:1;overflow-y:auto;padding:8px 0}
.tree::-webkit-scrollbar{width:4px}
.tree::-webkit-scrollbar-track{background:transparent}
.tree::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px}

/* TREE ITEMS */
.tree-item{display:flex;align-items:center;gap:0;cursor:pointer;
  padding:0;position:relative}
.tree-item-inner{display:flex;align-items:center;gap:6px;flex:1;
  padding:6px 14px;border-radius:0;transition:background .12s;min-width:0}
.tree-item-inner:hover{background:var(--surface2)}
.tree-item-inner.active{background:var(--green-bg);border-right:2px solid var(--green)}
.tree-toggle{width:16px;height:16px;flex-shrink:0;display:flex;align-items:center;
  justify-content:center;color:var(--text3);font-size:10px;transition:transform .2s}
.tree-toggle.open{transform:rotate(90deg)}
.tree-toggle.leaf{visibility:hidden}
.tree-icon{font-size:14px;flex-shrink:0}
.tree-label{font-size:13px;color:var(--text2);white-space:nowrap;
  overflow:hidden;text-overflow:ellipsis;flex:1}
.tree-item-inner.active .tree-label{color:var(--text);font-weight:600}
.tree-actions{display:none;gap:2px;padding-right:8px;flex-shrink:0}
.tree-item:hover .tree-actions{display:flex}
.tree-act{background:transparent;border:none;cursor:pointer;color:var(--text3);
  width:22px;height:22px;border-radius:4px;display:flex;align-items:center;
  justify-content:center;font-size:12px;transition:all .12s}
.tree-act:hover{background:var(--surface3);color:var(--text)}
.tree-act.del:hover{color:var(--red)}
.children{padding-left:16px}

/* EDITOR */
.editor-area{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.editor-toolbar{padding:10px 16px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:8px;flex-wrap:wrap;background:var(--surface)}
.editor-title-input{background:transparent;border:none;outline:none;
  font-size:18px;font-weight:700;color:var(--text);flex:1;min-width:200px}
.editor-title-input::placeholder{color:var(--text3)}
.editor-meta{font-size:11px;color:var(--text3);white-space:nowrap}
.toolbar-btns{display:flex;gap:4px;flex-wrap:wrap}
.tb-btn{background:var(--surface2);border:1px solid var(--border2);
  border-radius:5px;padding:4px 8px;font-size:12px;color:var(--text2);
  cursor:pointer;transition:all .12s}
.tb-btn:hover{background:var(--surface3);color:var(--text)}
.editor-content{flex:1;overflow-y:auto;padding:20px 24px}
.editor-content::-webkit-scrollbar{width:4px}
.editor-content::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px}
#note-editor{width:100%;min-height:100%;background:transparent;border:none;
  outline:none;font-size:14px;color:var(--text);line-height:1.8;resize:none;
  font-family:inherit}
#note-editor::placeholder{color:var(--text3)}

/* EMPTY STATE */
.empty-state{flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:12px;color:var(--text3);padding:40px}
.empty-state .icon{font-size:48px;opacity:.4}
.empty-state p{font-size:14px;text-align:center}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);
  display:flex;align-items:center;justify-content:center;z-index:200;padding:16px}
.modal{background:var(--surface);border:1px solid var(--border2);
  border-radius:var(--radius);padding:24px;width:100%;max-width:360px}
.modal h3{font-size:16px;font-weight:700;margin-bottom:16px}
.modal input{width:100%;background:var(--bg);border:1px solid var(--border2);
  border-radius:var(--radius-sm);padding:10px 12px;font-size:14px;
  color:var(--text);outline:none;margin-bottom:16px}
.modal input:focus{border-color:var(--green)}
.modal-btns{display:flex;gap:8px;justify-content:flex-end}
.btn-cancel{background:transparent;border:1px solid var(--border2);
  color:var(--text3);padding:8px 16px;border-radius:var(--radius-sm);
  cursor:pointer;font-size:13px}
.btn-confirm{background:var(--green);color:#fff;border:none;
  padding:8px 16px;border-radius:var(--radius-sm);cursor:pointer;
  font-size:13px;font-weight:600}

/* MOBILE */
@media(max-width:600px){
  .sidebar{width:100%;position:fixed;inset:53px 0 0 0;z-index:50;
    transform:translateX(-100%);transition:transform .25s}
  .sidebar.open{transform:translateX(0)}
  .editor-area{width:100%}
  .btn-menu{display:flex !important}
}
.btn-menu{display:none;background:transparent;border:none;cursor:pointer;
  color:var(--text2);font-size:20px;padding:4px}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <button class="btn-menu" id="btn-menu" onclick="toggleSidebar()">☰</button>
    <button class="btn-back" onclick="window.location.href='dashboard.html'">‹ Painel</button>
    <div class="logo">TEOT <span>Notas</span></div>
  </div>
  <div class="sync-row">
    <div class="sync-dot" id="sync-dot"></div>
    <span class="sync-lbl" id="sync-lbl">...</span>
  </div>
</div>

<div class="layout">
  <!-- SIDEBAR -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-title">MINHAS NOTAS</span>
      <div style="display:flex;gap:4px">
        <button class="btn-icon" title="Nova pasta" onclick="openModal('pasta',null)">📁</button>
        <button class="btn-icon" title="Nova nota" onclick="openModal('nota',null)">📝</button>
      </div>
    </div>
    <div class="sidebar-search">
      <input class="search-input" id="search" placeholder="🔍 Buscar..." oninput="renderTree()">
    </div>
    <div class="tree" id="tree"></div>
  </div>

  <!-- EDITOR -->
  <div class="editor-area" id="editor-area">
    <div class="empty-state" id="empty-state">
      <div class="icon">📝</div>
      <p>Selecione uma nota ou crie uma nova</p>
    </div>
    <div id="editor-panel" style="display:none;flex-direction:column;flex:1;overflow:hidden">
      <div class="editor-toolbar">
        <input class="editor-title-input" id="note-title" placeholder="Título da nota..."
          oninput="scheduleAutoSave()">
        <span class="editor-meta" id="note-meta"></span>
      </div>
      <div style="padding:8px 16px;border-bottom:1px solid var(--border);background:var(--surface)">
        <div class="toolbar-btns">
          <button class="tb-btn" onclick="fmt('**','**')" title="Negrito"><b>N</b></button>
          <button class="tb-btn" onclick="fmt('*','*')" title="Itálico"><i>I</i></button>
          <button class="tb-btn" onclick="fmtLine('# ')" title="Título H1">H1</button>
          <button class="tb-btn" onclick="fmtLine('## ')" title="Título H2">H2</button>
          <button class="tb-btn" onclick="fmtLine('### ')" title="Título H3">H3</button>
          <button class="tb-btn" onclick="fmtLine('- ')" title="Lista">• Lista</button>
          <button class="tb-btn" onclick="fmtLine('> ')" title="Citação">❝</button>
          <button class="tb-btn" onclick="fmt('`','`')" title="Código">{'}'}</button>
          <button class="tb-btn" onclick="fmtLine('---')" title="Separador">―</button>
          <button class="tb-btn" style="color:var(--red)" onclick="deleteNote()" title="Apagar nota">🗑</button>
        </div>
      </div>
      <div class="editor-content">
        <textarea id="note-editor" placeholder="Escreva sua nota aqui..." oninput="scheduleAutoSave()"></textarea>
      </div>
    </div>
  </div>
</div>

<!-- MODAL CRIAR -->
<div class="modal-overlay" id="modal" style="display:none" onclick="closeModal(event)">
  <div class="modal">
    <h3 id="modal-title">Nova pasta</h3>
    <input id="modal-input" placeholder="Nome..." onkeydown="if(event.key='Enter')confirmModal()">
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-confirm" onclick="confirmModal()">Criar</button>
    </div>
  </div>
</div>

<!-- MODAL MOVER -->
<div class="modal-overlay" id="move-modal" style="display:none" onclick="closeMoveModal(event)">
  <div class="modal">
    <h3>↗ Mover nota para...</h3>
    <div id="move-list" style="max-height:240px;overflow-y:auto;margin-bottom:16px;display:flex;flex-direction:column;gap:4px"></div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="document.getElementById('move-modal').style.display='none'">Cancelar</button>
    </div>
  </div>
</div>

<script>
// ── SESSÃO ──────────────────────────────────────
const session = localStorage.getItem('teot_session');
if (!session) { window.location.href = 'index.html'; throw new Error('no session'); }
const user = JSON.parse(session);

// ── SUPABASE ────────────────────────────────────
const SB_URL = 'https://piziokskqrrnxahabhbt.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBpemlva3NrcXJybnhhaGFiaGJ0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1NTY5NzMsImV4cCI6MjA5NTEzMjk3M30.elc7_qtJcm-HL4l8tIPvH9KNQMLMVEg9Ga2jwJPhA7g';
const H = {'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=representation'};

function api(path, opts={}) {
  const c = new AbortController(), t = setTimeout(()=>c.abort(), 10000);
  return fetch(SB_URL+'/rest/v1/'+path, {...opts, signal:c.signal, headers:{...H,...(opts.headers||{})}}).finally(()=>clearTimeout(t));
}

// ── ESTADO ──────────────────────────────────────
let pastas = [];
let notas = [];
let openFolders = new Set();
let currentNota = null;
let autoSaveTimer = null;
let modalMode = null;
let modalParentId = null;

// ── SYNC ────────────────────────────────────────
function setSync(s, t) {
  const d = document.getElementById('sync-dot');
  const l = document.getElementById('sync-lbl');
  if (d) d.className = 'sync-dot ' + s;
  if (l) l.textContent = t;
}

// ── CARREGAR DADOS ──────────────────────────────
async function loadAll() {
  setSync('loading', 'carregando...');
  try {
    const [rp, rn] = await Promise.all([
      api('pastas?usuario_id=eq.'+user.id+'&order=nome.asc&select=*'),
      api('notas?usuario_id=eq.'+user.id+'&order=atualizado_em.desc&select=id,titulo,pasta_id,atualizado_em')
    ]);
    pastas = await rp.json();
    notas = await rn.json();
    setSync('ok', 'sincronizado');
    renderTree();
  } catch(e) {
    setSync('err', 'erro ao carregar');
  }
}

// ── ÁRVORE ──────────────────────────────────────
function renderTree() {
  const tree = document.getElementById('tree');
  const q = document.getElementById('search').value.toLowerCase().trim();
  tree.innerHTML = '';

  if (q) {
    // Modo busca — mostra notas filtradas
    const found = notas.filter(n => n.titulo.toLowerCase().includes(q));
    if (!found.length) {
      tree.innerHTML = '<div style="padding:16px;text-align:center;font-size:13px;color:var(--text3)">Nenhuma nota encontrada</div>';
      return;
    }
    found.forEach(n => tree.appendChild(makeNoteItem(n, 0)));
    return;
  }

  // Pastas raiz
  const raiz = pastas.filter(p => !p.pai_id);
  raiz.forEach(p => tree.appendChild(makeFolderItem(p, 0)));

  // Notas sem pasta
  const semPasta = notas.filter(n => !n.pasta_id);
  if (semPasta.length) {
    const lbl = document.createElement('div');
    lbl.style = 'padding:8px 14px 4px;font-size:10px;font-weight:700;letter-spacing:.06em;color:var(--text3)';
    lbl.textContent = 'SEM PASTA';
    tree.appendChild(lbl);
    semPasta.forEach(n => tree.appendChild(makeNoteItem(n, 0)));
  }
}

function makeFolderItem(pasta, depth) {
  const wrap = document.createElement('div');
  const hasChildren = pastas.some(p => p.pai_id === pasta.id);
  const hasNotes = notas.some(n => n.pasta_id === pasta.id);
  const hasAny = hasChildren || hasNotes;
  const isOpen = openFolders.has(pasta.id);

  const row = document.createElement('div');
  row.className = 'tree-item';

  const inner = document.createElement('div');
  inner.className = 'tree-item-inner';
  inner.style.paddingLeft = (14 + depth * 16) + 'px';

  const toggle = document.createElement('span');
  toggle.className = 'tree-toggle' + (hasAny ? (isOpen ? ' open' : '') : ' leaf');
  toggle.textContent = '▶';

  const icon = document.createElement('span');
  icon.className = 'tree-icon';
  icon.textContent = isOpen ? '📂' : '📁';

  const label = document.createElement('span');
  label.className = 'tree-label';
  label.textContent = pasta.nome;

  inner.appendChild(toggle);
  inner.appendChild(icon);
  inner.appendChild(label);

  // Ações
  const actions = document.createElement('div');
  actions.className = 'tree-actions';

  const btnSubPasta = document.createElement('button');
  btnSubPasta.className = 'tree-act'; btnSubPasta.title = 'Nova subpasta';
  btnSubPasta.textContent = '📁';
  btnSubPasta.onclick = (e) => { e.stopPropagation(); openModal('pasta', pasta.id); };

  const btnNota = document.createElement('button');
  btnNota.className = 'tree-act'; btnNota.title = 'Nova nota aqui';
  btnNota.textContent = '📝';
  btnNota.onclick = (e) => { e.stopPropagation(); openModal('nota', pasta.id); };

  const btnDel = document.createElement('button');
  btnDel.className = 'tree-act del'; btnDel.title = 'Apagar pasta';
  btnDel.textContent = '✕';
  btnDel.onclick = (e) => { e.stopPropagation(); deletePasta(pasta.id); };

  actions.appendChild(btnSubPasta);
  actions.appendChild(btnNota);
  actions.appendChild(btnDel);

  row.appendChild(inner);
  row.appendChild(actions);

  inner.onclick = () => {
    if (hasAny) {
      if (isOpen) openFolders.delete(pasta.id); else openFolders.add(pasta.id);
      renderTree();
    }
  };

  wrap.appendChild(row);

  if (isOpen) {
    const children = document.createElement('div');
    children.className = 'children';
    pastas.filter(p => p.pai_id === pasta.id).forEach(sub => children.appendChild(makeFolderItem(sub, depth + 1)));
    notas.filter(n => n.pasta_id === pasta.id).forEach(n => children.appendChild(makeNoteItem(n, depth + 1)));
    wrap.appendChild(children);
  }

  return wrap;
}

function makeNoteItem(nota, depth) {
  const row = document.createElement('div');
  row.className = 'tree-item';

  const inner = document.createElement('div');
  inner.className = 'tree-item-inner' + (currentNota?.id === nota.id ? ' active' : '');
  inner.style.paddingLeft = (14 + depth * 16) + 'px';

  const toggle = document.createElement('span');
  toggle.className = 'tree-toggle leaf'; toggle.textContent = '▶';

  const icon = document.createElement('span');
  icon.className = 'tree-icon'; icon.textContent = '📄';

  const label = document.createElement('span');
  label.className = 'tree-label'; label.textContent = nota.titulo || 'Sem título';

  inner.appendChild(toggle); inner.appendChild(icon); inner.appendChild(label);
  inner.onclick = () => openNote(nota.id);

  const actions = document.createElement('div');
  actions.className = 'tree-actions';
  const btnMove = document.createElement('button');
  btnMove.className = 'tree-act'; btnMove.title = 'Mover nota';
  btnMove.textContent = '↗';
  btnMove.onclick = (e) => { e.stopPropagation(); openMoveModal(nota.id); };
  const btnDel = document.createElement('button');
  btnDel.className = 'tree-act del'; btnDel.title = 'Apagar nota';
  btnDel.textContent = '✕';
  btnDel.onclick = (e) => { e.stopPropagation(); deleteNoteById(nota.id); };
  actions.appendChild(btnMove);
  actions.appendChild(btnDel);

  row.appendChild(inner); row.appendChild(actions);
  return row;
}

// ── ABRIR NOTA ──────────────────────────────────
async function openNote(id) {
  if (currentNota && currentNota.id !== id) await saveCurrentNote();
  setSync('loading', 'carregando nota...');
  try {
    const r = await api('notas?id=eq.'+id+'&select=*');
    const rows = await r.json();
    if (!rows.length) return;
    currentNota = rows[0];
    document.getElementById('note-title').value = currentNota.titulo || '';
    document.getElementById('note-editor').value = currentNota.conteudo || '';
    updateMeta();
    document.getElementById('empty-state').style.display = 'none';
    document.getElementById('editor-panel').style.display = 'flex';
    setSync('ok', 'sincronizado');
    renderTree();
    // Mobile: fechar sidebar
    document.getElementById('sidebar').classList.remove('open');
  } catch(e) {
    setSync('err', 'erro ao abrir nota');
  }
}

function updateMeta() {
  if (!currentNota) return;
  const d = new Date(currentNota.atualizado_em);
  document.getElementById('note-meta').textContent =
    'Salvo em ' + d.toLocaleDateString('pt-BR') + ' ' + d.toLocaleTimeString('pt-BR', {hour:'2-digit',minute:'2-digit'});
}

// ── AUTO SAVE ───────────────────────────────────
function scheduleAutoSave() {
  clearTimeout(autoSaveTimer);
  setSync('loading', 'salvando...');
  autoSaveTimer = setTimeout(saveCurrentNote, 1500);
}

async function saveCurrentNote() {
  if (!currentNota) return;
  const titulo = document.getElementById('note-title').value.trim() || 'Sem título';
  const conteudo = document.getElementById('note-editor').value;
  try {
    const r = await api('notas?id=eq.'+currentNota.id, {
      method: 'PATCH',
      headers: {'Prefer': 'return=representation'},
      body: JSON.stringify({titulo, conteudo, atualizado_em: new Date().toISOString()})
    });
    const rows = await r.json();
    if (rows.length) {
      currentNota = rows[0];
      // Atualizar lista local
      const idx = notas.findIndex(n => n.id === currentNota.id);
      if (idx >= 0) { notas[idx].titulo = titulo; notas[idx].atualizado_em = currentNota.atualizado_em; }
      updateMeta();
      renderTree();
    }
    setSync('ok', 'salvo');
  } catch(e) {
    setSync('err', 'erro ao salvar');
  }
}

// ── MODAL ───────────────────────────────────────
function openModal(mode, parentId) {
  modalMode = mode;
  modalParentId = parentId;
  const titles = { pasta: parentId ? 'Nova subpasta' : 'Nova pasta', nota: 'Nova nota' };
  document.getElementById('modal-title').textContent = titles[mode];
  document.getElementById('modal-input').value = '';
  document.getElementById('modal').style.display = 'flex';
  setTimeout(() => document.getElementById('modal-input').focus(), 50);
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('modal')) return;
  document.getElementById('modal').style.display = 'none';
}

async function confirmModal() {
  const nome = document.getElementById('modal-input').value.trim();
  if (!nome) return;
  document.getElementById('modal').style.display = 'none';
  setSync('loading', 'criando...');
  try {
    if (modalMode === 'pasta') {
      const r = await api('pastas', {
        method: 'POST',
        body: JSON.stringify({usuario_id: user.id, nome, pai_id: modalParentId || null})
      });
      const rows = await r.json();
      pastas.push(rows[0]);
      if (modalParentId) openFolders.add(modalParentId);
      renderTree();
      setSync('ok', 'pasta criada');
    } else {
      const r = await api('notas', {
        method: 'POST',
        body: JSON.stringify({usuario_id: user.id, titulo: nome, pasta_id: modalParentId || null, conteudo: ''})
      });
      const rows = await r.json();
      notas.unshift({id: rows[0].id, titulo: rows[0].titulo, pasta_id: rows[0].pasta_id, atualizado_em: rows[0].atualizado_em});
      if (modalParentId) openFolders.add(modalParentId);
      renderTree();
      setSync('ok', 'nota criada');
      await openNote(rows[0].id);
    }
  } catch(e) {
    setSync('err', 'erro ao criar');
  }
}

// ── DELETAR ─────────────────────────────────────
async function deletePasta(id) {
  if (!confirm('Apagar esta pasta e todo seu conteúdo?')) return;
  setSync('loading', 'apagando...');
  try {
    await api('pastas?id=eq.'+id, {method:'DELETE', headers:{'Prefer':'return=minimal'}});
    pastas = pastas.filter(p => p.id !== id && p.pai_id !== id);
    notas = notas.filter(n => n.pasta_id !== id);
    if (currentNota && notas.findIndex(n => n.id === currentNota.id) < 0) {
      currentNota = null;
      document.getElementById('empty-state').style.display = 'flex';
      document.getElementById('editor-panel').style.display = 'none';
    }
    renderTree();
    setSync('ok', 'apagado');
  } catch(e) { setSync('err', 'erro ao apagar'); }
}

async function deleteNoteById(id) {
  if (!confirm('Apagar esta nota?')) return;
  setSync('loading', 'apagando...');
  try {
    await api('notas?id=eq.'+id, {method:'DELETE', headers:{'Prefer':'return=minimal'}});
    notas = notas.filter(n => n.id !== id);
    if (currentNota?.id === id) {
      currentNota = null;
      document.getElementById('empty-state').style.display = 'flex';
      document.getElementById('editor-panel').style.display = 'none';
    }
    renderTree();
    setSync('ok', 'apagado');
  } catch(e) { setSync('err', 'erro ao apagar'); }
}

async function deleteNote() {
  if (currentNota) await deleteNoteById(currentNota.id);
}

// ── FORMATAÇÃO ──────────────────────────────────
function fmt(before, after) {
  const ta = document.getElementById('note-editor');
  const s = ta.selectionStart, e = ta.selectionEnd;
  const sel = ta.value.substring(s, e);
  ta.value = ta.value.substring(0, s) + before + sel + after + ta.value.substring(e);
  ta.selectionStart = s + before.length;
  ta.selectionEnd = e + before.length;
  ta.focus(); scheduleAutoSave();
}

function fmtLine(prefix) {
  const ta = document.getElementById('note-editor');
  const s = ta.selectionStart;
  const lineStart = ta.value.lastIndexOf('\n', s - 1) + 1;
  ta.value = ta.value.substring(0, lineStart) + prefix + ta.value.substring(lineStart);
  ta.selectionStart = ta.selectionEnd = s + prefix.length;
  ta.focus(); scheduleAutoSave();
}

// ── MOBILE SIDEBAR ───────────────────────────────
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
}

// ── MOVER NOTA ──────────────────────────────────
let moveNoteId = null;

function openMoveModal(notaId) {
  moveNoteId = notaId;
  const list = document.getElementById('move-list');
  list.innerHTML = '';

  // Opção: sem pasta
  const semPasta = document.createElement('div');
  semPasta.style = 'padding:8px 12px;border-radius:6px;cursor:pointer;font-size:13px;color:var(--text2);background:var(--surface2);transition:background .12s';
  semPasta.textContent = '📄 Sem pasta (raiz)';
  semPasta.onmouseover = () => semPasta.style.background = 'var(--surface3)';
  semPasta.onmouseout = () => semPasta.style.background = 'var(--surface2)';
  semPasta.onclick = () => moveNoteTo(null);
  list.appendChild(semPasta);

  // Listar todas as pastas
  function addPastaOption(pasta, depth) {
    const opt = document.createElement('div');
    opt.style = 'padding:8px 12px;padding-left:'+(12+depth*16)+'px;border-radius:6px;cursor:pointer;font-size:13px;color:var(--text2);background:var(--surface2);transition:background .12s';
    opt.textContent = '📁 ' + pasta.nome;
    opt.onmouseover = () => opt.style.background = 'var(--surface3)';
    opt.onmouseout = () => opt.style.background = 'var(--surface2)';
    opt.onclick = () => moveNoteTo(pasta.id);
    list.appendChild(opt);
    pastas.filter(p => p.pai_id === pasta.id).forEach(sub => addPastaOption(sub, depth+1));
  }
  pastas.filter(p => !p.pai_id).forEach(p => addPastaOption(p, 0));

  if (pastas.length === 0) {
    const empty = document.createElement('div');
    empty.style = 'padding:12px;font-size:13px;color:var(--text3);text-align:center';
    empty.textContent = 'Nenhuma pasta criada ainda';
    list.appendChild(empty);
  }

  document.getElementById('move-modal').style.display = 'flex';
}

function closeMoveModal(e) {
  if (e && e.target !== document.getElementById('move-modal')) return;
  document.getElementById('move-modal').style.display = 'none';
  moveNoteId = null;
}

async function moveNoteTo(pastaId) {
  document.getElementById('move-modal').style.display = 'none';
  if (!moveNoteId) return;
  setSync('loading', 'movendo...');
  try {
    await api('notas?id=eq.'+moveNoteId, {
      method: 'PATCH',
      headers: {'Prefer': 'return=minimal'},
      body: JSON.stringify({pasta_id: pastaId})
    });
    const idx = notas.findIndex(n => n.id === moveNoteId);
    if (idx >= 0) notas[idx].pasta_id = pastaId;
    if (pastaId) openFolders.add(pastaId);
    renderTree();
    setSync('ok', 'nota movida');
  } catch(e) {
    setSync('err', 'erro ao mover');
  }
  moveNoteId = null;
}

// ── INIT ────────────────────────────────────────
loadAll();

// Salvar ao sair da página
window.addEventListener('beforeunload', () => { if (currentNota) saveCurrentNote(); });

// Fechar modal com Escape
document.addEventListener('keydown', e => { if (e.key === 'Escape') document.getElementById('modal').style.display = 'none'; });
