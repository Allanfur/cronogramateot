<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0f172a">
<title>TEOT — Cronograma</title>
<style>
:root{--bg:#0f172a;--surface:#1e293b;--surface2:#273549;
  --border:rgba(255,255,255,.08);--border2:rgba(255,255,255,.18);
  --text:#f1f5f9;--text2:#94a3b8;--text3:#64748b;
  --green:#10b981;--green-bg:rgba(16,185,129,.12);--green-border:rgba(16,185,129,.35);
  --blue:#3b82f6;--blue-bg:rgba(59,130,246,.12);--blue-border:rgba(59,130,246,.35);
  --red:#ef4444;--radius:12px;--radius-sm:8px}

html[data-theme='light'] {
  --bg:#f1f5f9; --surface:#ffffff; --surface2:#e2e8f0; --surface3:#cbd5e1;
  --border:rgba(0,0,0,0.08); --border2:rgba(0,0,0,0.15);
  --text:#0f172a; --text2:#334155; --text3:#64748b;
  --green:#059669; --green-bg:rgba(5,150,105,0.1); --green-border:rgba(5,150,105,0.3);
  --blue:#2563eb; --blue-bg:rgba(37,99,235,0.1); --blue-border:rgba(37,99,235,0.3);
  --red:#dc2626; --yellow:#d97706;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
  background:var(--bg);color:var(--text);min-height:100vh;font-size:15px}
.crono-header{background:var(--surface);border-bottom:1px solid var(--border);
  padding:12px 16px 0;position:sticky;top:0;z-index:100}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.btn-back{font-size:13px;color:var(--text2);background:transparent;border:none;
  cursor:pointer;display:flex;align-items:center;gap:4px;padding:4px 0}
.btn-back:hover{color:var(--green)}
.header-title{font-size:15px;font-weight:700}
.header-right{display:flex;align-items:center;gap:8px}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--text3);transition:background .3s}
.sync-dot.ok{background:var(--green)}
.sync-dot.err{background:var(--red)}
.sync-dot.loading{background:#f59e0b;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.sync-lbl{font-size:11px;color:var(--text3)}
.stats-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;
  padding:12px 16px;background:var(--bg);border-bottom:1px solid var(--border)}
.stat{background:var(--surface);border-radius:var(--radius-sm);padding:10px 8px;text-align:center}
.stat-val{font-size:18px;font-weight:700}
.stat-lbl{font-size:10px;color:var(--text3);margin-top:2px}
.prog-section{padding:12px 16px;background:var(--bg);border-bottom:1px solid var(--border)}
.prog-row{display:flex;justify-content:space-between;font-size:12px;color:var(--text2);margin-bottom:6px}
.prog-track{height:6px;background:var(--surface2);border-radius:99px;overflow:hidden;margin-bottom:6px}
.prog-fill{height:100%;border-radius:99px;background:var(--green);transition:width .4s}
.prog-mini{display:flex;gap:3px;margin-top:8px}
.mini-bar{flex:1;height:4px;border-radius:99px;background:var(--surface2);
  transition:background .3s;cursor:pointer}
.mini-bar.done{background:var(--green)}
.mini-bar.partial{background:var(--blue)}
.nav-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;
  background:var(--surface);border-bottom:1px solid var(--border)}
.nav-scroll::-webkit-scrollbar{display:none}
.nav-inner{display:flex;padding:10px 16px;gap:6px;white-space:nowrap;min-width:max-content}
.nav-btn{font-size:13px;padding:6px 14px;border-radius:99px;border:1px solid var(--border2);
  background:transparent;color:var(--text2);cursor:pointer;transition:all .15s}
.nav-btn.active{background:var(--green);border-color:var(--green);color:#fff;font-weight:600}
.filter-bar{padding:10px 16px;background:var(--bg);border-bottom:1px solid var(--border);
  display:flex;gap:8px;align-items:center}
.filter-lbl{font-size:12px;color:var(--text3)}
.seg{display:flex;background:var(--surface);border-radius:var(--radius-sm);
  border:1px solid var(--border);overflow:hidden;flex:1}
.seg-btn{flex:1;font-size:12px;padding:6px 4px;border:none;background:transparent;
  color:var(--text2);cursor:pointer;transition:all .15s;text-align:center}
.seg-btn.active{background:var(--surface2);color:var(--text);font-weight:600}
main{padding:12px 16px 80px}
.mod-block{margin-bottom:24px}
.mod-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px;gap:8px}
.mod-title{font-size:15px;font-weight:700}
.mod-weeks{font-size:11px;color:var(--text3);margin-top:2px}
.mod-pct{font-size:12px;color:var(--text3);text-align:right;flex-shrink:0}
.mod-pct strong{font-size:15px;font-weight:700;color:var(--green);display:block}
.mod-track{height:3px;background:var(--surface2);border-radius:99px;overflow:hidden;margin-bottom:10px}
.mod-track-fill{height:100%;border-radius:99px;background:var(--green);transition:width .3s}
.section-label{font-size:10px;font-weight:700;letter-spacing:.08em;color:var(--text3);margin-bottom:7px}
.section-label.hab{color:#60a5fa;margin-top:10px}
.cards-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
@media(max-width:380px){.cards-grid{grid-template-columns:1fr}.stats-bar{grid-template-columns:repeat(2,1fr)}}
@media(min-width:600px){.cards-grid{grid-template-columns:repeat(3,1fr)}}
.topic-card,.hab-card{background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius-sm);padding:10px;cursor:pointer;
  display:flex;align-items:flex-start;gap:8px;
  transition:border-color .15s,background .15s;
  -webkit-user-select:none;user-select:none}
.topic-card:active,.hab-card:active{opacity:.75;transform:scale(.98)}
.topic-card.done{background:var(--green-bg);border-color:var(--green-border)}
.hab-card.done{background:var(--blue-bg);border-color:var(--blue-border)}
.chk{width:18px;height:18px;border-radius:4px;border:1.5px solid var(--border2);
  flex-shrink:0;margin-top:1px;display:flex;align-items:center;
  justify-content:center;transition:all .15s}
.topic-card.done .chk{background:var(--green);border-color:var(--green)}
.hab-card.done .chk{background:var(--blue);border-color:var(--blue)}
.chk svg{display:none}
.done .chk svg{display:block}
.card-text{font-size:13px;color:var(--text);line-height:1.35}
.topic-card.done .card-text{color:#6ee7b7}
.hab-card.done .card-text{color:#93c5fd}
.card-week{font-size:10px;color:var(--text3);margin-top:3px}
.topic-card.done .card-week{color:#34d399}
.hab-card.done .card-week{color:#60a5fa}
.divider{height:1px;background:var(--border);margin:20px 0}
.empty{text-align:center;padding:40px 16px;color:var(--text3);font-size:14px}
.crono-footer{position:fixed;bottom:0;left:0;right:0;background:var(--surface);
  border-top:1px solid var(--border);padding:10px 16px;display:flex;
  justify-content:center;align-items:center;gap:16px;font-size:11px;color:var(--text3)}
.dot{width:6px;height:6px;border-radius:50%}
.dot.green{background:var(--green)}
.dot.blue{background:var(--blue)}
</style>
</head>

<div class="crono-header">

    <button class="btn-back" onclick="window.location.href='dashboard.html'">‹ Painel</button>
    <div class="header-title">Cronograma TEOT</div>

  position:relative;width:52px;height:26px;border-radius:99px;
  background:var(--surface2);border:1px solid var(--border2);
  cursor:pointer;transition:background .2s;flex-shrink:0;display:flex;
  align-items:center;justify-content:space-between;padding:0 6px">
  <span style="font-size:10px;line-height:1">🌙</span>

</div>

<div class="stats-bar">

  <div class="stat"><div class="stat-val" id="st-p">0%</div><div class="stat-lbl">Progresso</div></div>
  <div class="stat"><div class="stat-val" id="st-m">0</div><div class="stat-lbl">Módulos</div></div>
</div>

<div class="prog-section">
  <div class="prog-row"><span>Progresso geral</span><span id="prog-lbl">0 / 0 itens</span></div>
  <div class="prog-track"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
  <div class="prog-mini" id="prog-mini"></div>
</div>

<div class="nav-scroll"><div class="nav-inner" id="nav-inner"></div></div>

<div class="filter-bar">
  <span class="filter-lbl">Filtrar:</span>
  <div class="seg">
    <button class="seg-btn active" onclick="setFilter('all',this)">Todos</button>
    <button class="seg-btn" onclick="setFilter('pending',this)">Pendentes</button>
    <button class="seg-btn" onclick="setFilter('done',this)">Feitos</button>
  </div>
</div>

<main id="main"></main>

<div class="crono-footer">
  <span class="dot green"></span><span>Tópico</span>
  <span class="dot blue"></span><span>Habilidade</span>
  <span id="footer-status" style="color:var(--text3)">...</span>
</div>

function sid(mod,type,idx){return mod+'|'+type+'|'+idx;}

function setSyncStatus(s,t){
  const dot=document.getElementById('sync-dot');
  const lbl=document.getElementById('sync-lbl');
  const fs=document.getElementById('footer-status');
  if(dot)dot.className='sync-dot '+s;
  if(lbl)lbl.textContent=t;
  if(fs)fs.textContent=t;
}

  setSyncStatus('loading','carregando...');
  try{
    const r=await api('progresso_v2?usuario_id=eq.'+user.id+'&select=item_id');
    if(!r.ok)throw new Error();
    state={};
    (await r.json()).forEach(row=>{state[row.item_id]=true;});
    setSyncStatus('ok','sincronizado');
  }catch(e){setSyncStatus('err','erro ao carregar');}
  render();
}

async function toggleItem(id){
  const was=!!state[id];
  if(was)delete state[id]; else state[id]=true;
  render();
  setSyncStatus('loading','salvando...');
  try{
    if(!was){
      await api('progresso_v2',{method:'POST',
        headers:{'Prefer':'resolution=merge-duplicates,return=minimal'},
        body:JSON.stringify([{usuario_id:user.id,cronograma_id:null,item_id:id,atualizado_em:new Date().toISOString()}])});
    } else {
      await api('progresso_v2?usuario_id=eq.'+user.id+'&item_id=eq.'+encodeURIComponent(id),
        {method:'DELETE',headers:{'Prefer':'return=minimal'}});
    }
    setSyncStatus('ok','sincronizado');
  }catch(e){
    setSyncStatus('err','erro ao salvar');
    if(!was)delete state[id]; else state[id]=true;
    render();
  }
}

function counts(){
  let tt=0,td=0,ht=0,hd=0,mc=0;
  CRONO_DATA.forEach(m=>{
    let mt=0,md=0,mh=0,mhd=0;
    m.topics.forEach((_,i)=>{tt++;mt++;if(state[sid(m.mod,'t',i)]){td++;md++;}});
    m.hab.forEach((_,i)=>{ht++;mh++;if(state[sid(m.mod,'h',i)]){hd++;mhd++;}});
    if((mt+mh)>0&&(md+mhd)===(mt+mh))mc++;
  });
  return{tt,td,ht,hd,mc,total:tt+ht,done:td+hd};
}

function chk(){return '<svg width="11" height="11" viewBox="0 0 11 11" fill="none"><polyline points="1.5,5.5 4.5,8.5 9.5,2.5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>';}

function setFilter(f,btn){
  activeFilter=f;
  document.querySelectorAll('.seg-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function setTab(t){
  activeTab=t;
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.toggle('active',b.dataset.tab===t));
  render();
}

function render(){
  const nav=document.getElementById('nav-inner');
  if(!nav)return;
  nav.innerHTML='';
  ['Todos',...CRONO_DATA.map(m=>m.mod)].forEach((label,i)=>{
    const key=i===0?'all':CRONO_DATA[i-1].mod;
    const b=document.createElement('button');
    b.className='nav-btn'+(activeTab===key?' active':'');
    b.dataset.tab=key; b.textContent=label;
    b.onclick=()=>setTab(key);
    nav.appendChild(b);
  });

  const mini=document.getElementById('prog-mini');
  mini.innerHTML='';
  CRONO_DATA.forEach(m=>{
    const tot=m.topics.length+m.hab.length;
    const dn=m.topics.filter((_,i)=>state[sid(m.mod,'t',i)]).length
            +m.hab.filter((_,i)=>state[sid(m.mod,'h',i)]).length;
    const b=document.createElement('div');
    b.className='mini-bar'+(dn===tot&&tot>0?' done':dn>0?' partial':'');
    b.title=m.mod+': '+dn+'/'+tot;
    b.onclick=()=>setTab(m.mod);
    mini.appendChild(b);
  });

  const c=counts();
  document.getElementById('st-t').textContent=c.td+'/'+c.tt;
  document.getElementById('st-h').textContent=c.hd+'/'+c.ht;
  const pct=c.total>0?Math.round(c.done/c.total*100):0;
  document.getElementById('st-p').textContent=pct+'%';
  document.getElementById('st-m').textContent=c.mc+'/'+CRONO_DATA.length;
  document.getElementById('prog-lbl').textContent=c.done+' / '+c.total+' itens';
  document.getElementById('prog-fill').style.width=pct+'%';

  const main=document.getElementById('main');
  main.innerHTML='';
  const toShow=activeTab==='all'?CRONO_DATA:CRONO_DATA.filter(m=>m.mod===activeTab);
  let first=true;

  toShow.forEach(m=>{
    const doneT=m.topics.filter((_,i)=>state[sid(m.mod,'t',i)]).length;
    const doneH=m.hab.filter((_,i)=>state[sid(m.mod,'h',i)]).length;
    const total=m.topics.length+m.hab.length, done=doneT+doneH;
    const mpct=total>0?Math.round(done/total*100):0;

    const fT=m.topics.filter((_,i)=>{const d=!!state[sid(m.mod,'t',i)];return activeFilter==='all'||(activeFilter==='done'&&d)||(activeFilter==='pending'&&!d);});
    const fH=m.hab.filter((_,i)=>{const d=!!state[sid(m.mod,'h',i)];return activeFilter==='all'||(activeFilter==='done'&&d)||(activeFilter==='pending'&&!d);});
    if(!fT.length&&!fH.length)return;

    if(!first){const dv=document.createElement('div');dv.className='divider';main.appendChild(dv);}
    first=false;

    const wrap=document.createElement('div');
    wrap.className='mod-block';
    wrap.innerHTML=`<div class="mod-head"><div><div class="mod-title">${m.mod}</div><div class="mod-weeks">${m.semanas}</div></div><div class="mod-pct"><strong>${mpct}%</strong>${done}/${total}</div></div><div class="mod-track"><div class="mod-track-fill" style="width:${mpct}%"></div></div>`;

    if(fT.length){
      const lbl=document.createElement('div');lbl.className='section-label';lbl.textContent='TÓPICOS';wrap.appendChild(lbl);
      const grid=document.createElement('div');grid.className='cards-grid';
      m.topics.forEach((tp,i)=>{
        const id=sid(m.mod,'t',i);const d=!!state[id];
        if(activeFilter==='done'&&!d||activeFilter==='pending'&&d)return;
        const card=document.createElement('div');
        card.className='topic-card'+(d?' done':'');
        card.innerHTML=`<div class="chk">${chk()}</div><div><div class="card-text">${tp.t}</div><div class="card-week">${tp.s}</div></div>`;
        card.onclick=()=>toggleItem(id);
        grid.appendChild(card);
      });
      wrap.appendChild(grid);
    }

    if(fH.length){
      const lbl=document.createElement('div');lbl.className='section-label hab';lbl.textContent='⚙ HABILIDADES PRÁTICAS';wrap.appendChild(lbl);
      const grid=document.createElement('div');grid.className='cards-grid';
      m.hab.forEach((h,i)=>{
        const id=sid(m.mod,'h',i);const d=!!state[id];
        if(activeFilter==='done'&&!d||activeFilter==='pending'&&d)return;
        const card=document.createElement('div');
        card.className='hab-card'+(d?' done':'');
        card.innerHTML=`<div class="chk">${chk()}</div><div><div class="card-text">${h.t}</div><div class="card-week">${h.s}</div></div>`;
        card.onclick=()=>toggleItem(id);
        grid.appendChild(card);
      });
      wrap.appendChild(grid);
    }
    main.appendChild(wrap);
  });

  if(first)main.innerHTML='<div class="empty">Nenhum item para mostrar.</div>';
}


// ── TEMA ─────────────────────────────────────────
function loadTheme() {
  const t = localStorage.getItem('teot_theme') || 'dark';
  document.documentElement.setAttribute('data-theme', t);
  updateThemeBtn(t);
}
function updateThemeBtn(t) {
  const pill = document.getElementById('theme-pill');
  if (!pill) return;
  pill.style.transform = t === 'dark' ? 'translateX(0)' : 'translateX(26px)';
}
function toggleTheme() {
  const current = document.documentElement.getAttribute('data-theme') || 'dark';
  const next = current === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('teot_theme', next);
  updateThemeBtn(next);
}
loadTheme();

loadProgress();
</script>
</body>
