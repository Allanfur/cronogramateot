<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0f172a">
<title>TEOT — Login</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/js-sha256/0.9.0/sha256.min.js"></script>
<style>
:root {
  --bg:#0f172a; --surface:#1e293b; --border:rgba(255,255,255,0.08);
  --border2:rgba(255,255,255,0.18); --text:#f1f5f9; --text2:#94a3b8;
  --text3:#64748b; --green:#10b981; --red:#ef4444;
  --radius:12px; --radius-sm:8px;
}

html[data-theme='light'] {
  --bg:#f1f5f9; --surface:#ffffff; --surface2:#e2e8f0; --surface3:#cbd5e1;
  --border:rgba(0,0,0,0.08); --border2:rgba(0,0,0,0.15);
  --text:#0f172a; --text2:#334155; --text3:#64748b;
  --green:#059669; --green-bg:rgba(5,150,105,0.1); --green-border:rgba(5,150,105,0.3);
  --blue:#2563eb; --blue-bg:rgba(37,99,235,0.1); --blue-border:rgba(37,99,235,0.3);
  --red:#dc2626; --yellow:#d97706;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
  background:var(--bg);color:var(--text);min-height:100vh;font-size:15px;
  display:flex;align-items:center;justify-content:center;padding:24px 16px}
.box{width:100%;max-width:380px}
.logo{text-align:center;margin-bottom:32px}
.logo-title{font-size:28px;font-weight:800;letter-spacing:-0.5px}
.logo-title span{color:var(--green)}
.logo-sub{font-size:13px;color:var(--text3);margin-top:4px}
.cd-tabs{display:flex;gap:4px;justify-content:center;margin-bottom:10px}
.cd-tab{font-size:11px;font-weight:600;padding:4px 12px;border-radius:99px;
  border:1px solid var(--border2);background:transparent;color:var(--text3);
  cursor:pointer;transition:all .15s}
.cd-tab.active{background:var(--green);border-color:var(--green);color:#fff}
.countdown-box{background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:16px;margin-bottom:20px;text-align:center}
.cd-title{font-size:11px;font-weight:700;letter-spacing:.08em;color:var(--text3);margin-bottom:10px}
.cd-grid{display:flex;justify-content:center;gap:8px}
.cd-unit{background:var(--bg);border-radius:var(--radius-sm);padding:8px 10px;min-width:54px}
.cd-num{font-size:26px;font-weight:800;color:var(--green);line-height:1;font-variant-numeric:tabular-nums}
.cd-lbl{font-size:10px;color:var(--text3);margin-top:3px}
.cd-sub{font-size:11px;color:var(--text3);margin-top:10px}
.cd-sub span{color:var(--green);font-weight:600}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:28px 24px}
.tabs{display:flex;background:var(--bg);border-radius:var(--radius-sm);padding:3px;margin-bottom:24px}
.tab{flex:1;text-align:center;font-size:12px;padding:7px;border-radius:6px;cursor:pointer;
  color:var(--text3);transition:all .2s;border:none;background:transparent}
.tab.active{background:var(--surface);color:var(--text);font-weight:600;box-shadow:0 1px 4px rgba(0,0,0,.3)}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;color:var(--text2);margin-bottom:6px;font-weight:500}
.field input{width:100%;background:var(--bg);border:1px solid var(--border2);
  border-radius:var(--radius-sm);padding:10px 12px;font-size:14px;color:var(--text);
  outline:none;transition:border-color .2s;-webkit-appearance:none}
.field input:focus{border-color:var(--green)}
.btn{width:100%;background:var(--green);color:#fff;font-size:14px;font-weight:700;
  padding:11px;border-radius:var(--radius-sm);border:none;cursor:pointer;
  transition:opacity .15s;margin-top:4px}
.btn:active{opacity:.8}
.btn:disabled{opacity:.5;cursor:not-allowed}
.error{font-size:12px;color:var(--red);text-align:center;margin-top:10px;min-height:18px}
.footer{text-align:center;font-size:12px;color:var(--text3);margin-top:20px}
.hint{font-size:12px;color:var(--text3);margin-bottom:14px}
</style>
</head>
<body>
<div class="box">
  <div class="logo">
    <div class="logo-title">TEOT <span>Estudos</span></div>
    <div class="logo-sub">Desenvolvido pelo Allan Furtado</div>
    <div style="margin-top:8px"><div id="theme-btn" onclick="toggleTheme()" title="Alternar tema" style="
  position:relative;width:52px;height:26px;border-radius:99px;
  background:var(--surface2);border:1px solid var(--border2);
  cursor:pointer;transition:background .2s;flex-shrink:0;display:flex;
  align-items:center;justify-content:space-between;padding:0 6px">
  <span style="font-size:10px;line-height:1">🌙</span>
  <span style="font-size:10px;line-height:1">☀️</span>
  <span id="theme-pill" style="position:absolute;top:3px;left:3px;
    width:18px;height:18px;border-radius:99px;background:var(--green);
    transition:transform .25s cubic-bezier(.4,0,.2,1)"></span>
</div></div>
  </div>

    <div class="countdown-box">
    <div class="cd-tabs">
      <button class="cd-tab active" onclick="setProva(0,this)">TARO</button>
      <button class="cd-tab" onclick="setProva(1,this)">TEOT 1ª</button>
      <button class="cd-tab" onclick="setProva(2,this)">TEOT 2ª</button>
    </div>
    <div class="cd-title" id="cd-title">⏳ FALTAM PARA A PROVA DO TARO</div>
    <div class="cd-grid">
      <div class="cd-unit"><div class="cd-num" id="cd-d">--</div><div class="cd-lbl">dias</div></div>
      <div class="cd-unit"><div class="cd-num" id="cd-h">--</div><div class="cd-lbl">horas</div></div>
      <div class="cd-unit"><div class="cd-num" id="cd-m">--</div><div class="cd-lbl">min</div></div>
      <div class="cd-unit"><div class="cd-num" id="cd-s">--</div><div class="cd-lbl">seg</div></div>
    </div>
    <div class="cd-sub" id="cd-sub">Prova em <span>12/08/2026</span></div>
  </div>
      <div class="cd-unit"><div class="cd-num" id="cd-h">--</div><div class="cd-lbl">horas</div></div>
      <div class="cd-unit"><div class="cd-num" id="cd-m">--</div><div class="cd-lbl">min</div></div>
      <div class="cd-unit"><div class="cd-num" id="cd-s">--</div><div class="cd-lbl">seg</div></div>
    </div>
    <div class="cd-sub">Prova em <span>12/08/2026</span></div>
  </div>

  <div class="card">
    <div class="tabs">
      <button class="tab active" onclick="switchTab('login')">Entrar</button>
      <button class="tab" onclick="switchTab('register')">Cadastrar</button>
      <button class="tab" onclick="switchTab('reset')" style="font-size:11px">Resetar</button>
    </div>

    <!-- LOGIN -->
    <div id="tab-login">
      <div class="field"><label>Nome</label>
        <input id="l-nome" type="text" placeholder="Seu nome" autocomplete="username"></div>
      <div class="field"><label>Senha</label>
        <input id="l-senha" type="password" placeholder="••••••••" autocomplete="current-password"></div>
      <button class="btn" onclick="doLogin()">Entrar</button>
    </div>

    <!-- CADASTRAR -->
    <div id="tab-register" style="display:none">
      <div class="field"><label>Nome</label>
        <input id="r-nome" type="text" placeholder="Seu nome" autocomplete="username"></div>
      <div class="field"><label>Senha</label>
        <input id="r-senha" type="password" placeholder="Mínimo 6 caracteres" autocomplete="new-password"></div>
      <div class="field"><label>Confirmar senha</label>
        <input id="r-senha2" type="password" placeholder="Repita a senha" autocomplete="new-password"></div>
      <div class="field"><label>Código de convite</label>
        <input id="r-codigo" type="text" placeholder="Código de acesso" autocomplete="off"></div>
      <button class="btn" onclick="doRegister()">Criar conta</button>
    </div>

    <!-- RESETAR -->
    <div id="tab-reset" style="display:none">
      <p class="hint">Redefina sua senha usando o código de convite.</p>
      <div class="field"><label>Nome</label>
        <input id="rst-nome" type="text" placeholder="Seu nome" autocomplete="username"></div>
      <div class="field"><label>Nova senha</label>
        <input id="rst-senha" type="password" placeholder="Mínimo 6 caracteres" autocomplete="new-password"></div>
      <div class="field"><label>Confirmar nova senha</label>
        <input id="rst-senha2" type="password" placeholder="Repita a nova senha" autocomplete="new-password"></div>
      <div class="field"><label>Código de convite</label>
        <input id="rst-codigo" type="text" placeholder="Código de acesso" autocomplete="off"></div>
      <button class="btn" onclick="doReset()">Redefinir senha</button>
    </div>

    <div class="error" id="error"></div>
  </div>
  <div class="footer">Bons estudos 📚</div>
</div>

<script>
const SB_URL = 'https://piziokskqrrnxahabhbt.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBpemlva3NrcXJybnhhaGFiaGJ0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1NTY5NzMsImV4cCI6MjA5NTEzMjk3M30.elc7_qtJcm-HL4l8tIPvH9KNQMLMVEg9Ga2jwJPhA7g';
const H = {'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=representation'};

function api(path, opts={}) {
  const c=new AbortController(), t=setTimeout(()=>c.abort(),8000);
  return fetch(SB_URL+'/rest/v1/'+path,{...opts,signal:c.signal,headers:{...H,...(opts.headers||{})}}).finally(()=>clearTimeout(t));
}

async function hashSenha(s) {
  if (window.crypto?.subtle) {
    try {
      const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(s));
      return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
    } catch(e){}
  }
  return sha256(s);
}

function setErr(msg) { document.getElementById('error').textContent = msg; }

function switchTab(tab) {
  ['login','register','reset'].forEach((t,i)=>{
    document.querySelectorAll('.tab')[i].classList.toggle('active', t===tab);
    document.getElementById('tab-'+t).style.display = t===tab ? '' : 'none';
  });
  setErr('');
}

async function doLogin() {
  const nome=document.getElementById('l-nome').value.trim();
  const senha=document.getElementById('l-senha').value;
  if (!nome||!senha){setErr('Preencha todos os campos.');return;}
  const btn=document.querySelector('#tab-login .btn');
  btn.disabled=true; setErr('Entrando...');
  try {
    const hash=await hashSenha(senha);
    const r=await api('usuarios?nome=eq.'+encodeURIComponent(nome)+'&select=id,nome,is_admin,senha_hash');
    if(!r.ok){setErr('Erro do servidor: '+r.status);return;}
    const rows=await r.json();
    if(!rows.length){setErr('Usuário não encontrado.');return;}
    if(rows[0].senha_hash!==hash){setErr('Senha incorreta.');return;}
    const {senha_hash,...user}=rows[0];
    localStorage.setItem('teot_session',JSON.stringify(user));
    window.location.href='dashboard.html';
  } catch(e){setErr('Erro: '+(e.name==='AbortError'?'tempo esgotado':e.message));}
  finally{btn.disabled=false;}
}

async function doRegister() {
  const nome=document.getElementById('r-nome').value.trim();
  const senha=document.getElementById('r-senha').value;
  const senha2=document.getElementById('r-senha2').value;
  const codigo=document.getElementById('r-codigo').value.trim().toLowerCase();
  if(!nome||!senha||!senha2||!codigo){setErr('Preencha todos os campos.');return;}
  if(senha!==senha2){setErr('As senhas não coincidem.');return;}
  if(senha.length<6){setErr('Senha deve ter ao menos 6 caracteres.');return;}
  const btn=document.querySelector('#tab-register .btn');
  btn.disabled=true; setErr('Verificando código...');
  try {
    const rc=await api('codigos_convite?codigo=eq.'+encodeURIComponent(codigo)+'&ativo=eq.true&select=codigo');
    if(!rc.ok){setErr('Erro ao verificar código.');return;}
    if(!(await rc.json()).length){setErr('Código de convite inválido.');return;}
    setErr('Criando conta...');
    const hash=await hashSenha(senha);
    const r=await api('usuarios',{method:'POST',body:JSON.stringify({nome,senha_hash:hash})});
    if(r.status===409){setErr('Esse nome já está em uso.');return;}
    if(!r.ok){setErr('Erro ao criar conta: '+r.status);return;}
    const rows=await r.json();
    const {senha_hash,...user}=rows[0];
    localStorage.setItem('teot_session',JSON.stringify(user));
    window.location.href='dashboard.html';
  } catch(e){setErr('Erro: '+(e.name==='AbortError'?'tempo esgotado':e.message));}
  finally{btn.disabled=false;}
}

async function doReset() {
  const nome=document.getElementById('rst-nome').value.trim();
  const senha=document.getElementById('rst-senha').value;
  const senha2=document.getElementById('rst-senha2').value;
  const codigo=document.getElementById('rst-codigo').value.trim().toLowerCase();
  if(!nome||!senha||!senha2||!codigo){setErr('Preencha todos os campos.');return;}
  if(senha.length<6){setErr('Senha deve ter ao menos 6 caracteres.');return;}
  if(senha!==senha2){setErr('As senhas não coincidem.');return;}
  const btn=document.querySelector('#tab-reset .btn');
  btn.disabled=true; setErr('Verificando código...');
  try {
    const rc=await api('codigos_convite?codigo=eq.'+encodeURIComponent(codigo)+'&ativo=eq.true&select=codigo');
    if(!rc.ok){setErr('Erro ao verificar código.');return;}
    if(!(await rc.json()).length){setErr('Código de convite inválido.');return;}
    setErr('Atualizando senha...');
    const ru=await api('usuarios?nome=eq.'+encodeURIComponent(nome)+'&select=id');
    if(!ru.ok){setErr('Erro do servidor.');return;}
    const users=await ru.json();
    if(!users.length){setErr('Usuário não encontrado.');return;}
    const hash=await hashSenha(senha);
    const rp=await api('usuarios?id=eq.'+users[0].id,{method:'PATCH',headers:{'Prefer':'return=minimal'},body:JSON.stringify({senha_hash:hash})});
    if(!rp.ok){setErr('Erro ao atualizar senha: '+rp.status);return;}
    setErr('');
    alert('Senha redefinida! Faça login com a nova senha.');
    switchTab('login');
    document.getElementById('l-nome').value=nome;
  } catch(e){setErr('Erro: '+(e.name==='AbortError'?'tempo esgotado':e.message));}
  finally{btn.disabled=false;}
}

// Countdown

const PROVAS = [
  { nome: 'PROVA DO TARO',        data: '2026-08-12T08:00:00', label: '12/08/2026' },
  { nome: 'TEOT 1ª FASE',         data: '2027-01-10T08:00:00', label: '10/01/2027' },
  { nome: 'TEOT 2ª FASE',         data: '2027-02-26T08:00:00', label: '26/02/2027' },
];
let provaIdx = 0;

function setProva(idx, btn) {
  provaIdx = idx;
  document.querySelectorAll('.cd-tab').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  const p = PROVAS[idx];
  const title = document.getElementById('cd-title');
  const sub   = document.getElementById('cd-sub');
  if (title) title.textContent = '⏳ FALTAM PARA A ' + p.nome;
  if (sub)   sub.innerHTML = 'Prova em <span>' + p.label + '</span>';
  tick();
}

function tick() {
  const prova = new Date(PROVAS[provaIdx].data);
  const diff  = Math.max(0, prova - new Date());
  document.getElementById('cd-d').textContent=String(Math.floor(diff/86400000)).padStart(2,'0');
  document.getElementById('cd-h').textContent=String(Math.floor(diff%86400000/3600000)).padStart(2,'0');
  document.getElementById('cd-m').textContent=String(Math.floor(diff%3600000/60000)).padStart(2,'0');
  document.getElementById('cd-s').textContent=String(Math.floor(diff%60000/1000)).padStart(2,'0');
}
tick(); setInterval(tick,1000);



// ── TEMA ─────────────────────────────────────────
function loadTheme() {
  const t = localStorage.getItem('teot_theme') || 'dark';
  document.documentElement.setAttribute('data-theme', t);
  updateThemeBtn(t);
}
function updateThemeBtn(t) {
  const pill = document.getElementById('theme-pill');
  if (!pill) return;
  pill.style.transform = t === 'dark' ? 'translateX(0)' : 'translateX(26px)';
}
function toggleTheme() {
  const current = document.documentElement.getAttribute('data-theme') || 'dark';
  const next = current === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('teot_theme', next);
  updateThemeBtn(next);
}
loadTheme();

// Enter key
document.getElementById('l-senha').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
document.getElementById('l-nome').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
</script>
</body>
</html>
